name: anchor-task-reboot

services:
  db:
    image: postgres:16-alpine
    container_name: anchor-task-reboot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: anchor_reboot
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5434:5432'
    volumes:
      - ../../../data/rebuilds/anchor-task-reboot/db:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app_user -d anchor_reboot']
      interval: 5s
      timeout: 5s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v12.2.8
    platform: linux/amd64
    container_name: anchor-task-reboot-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3003:3000'
    environment:
      PGRST_DB_URI: postgres://authenticator:authenticator_password@db:5432/anchor_reboot
      PGRST_DB_SCHEMAS: api
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_SERVER_HOST: 0.0.0.0
      PGRST_SERVER_PORT: 3000
